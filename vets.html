<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Vets Near You</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>

  <body>
    <!-- week 6 update -->
    <header>
      <div class="container">
        <h1>Furst Response</h1>
        <nav>
          <a href="index.html">Home</a>
        </nav>
      </div>
    </header>

    <section class="container">
      <h2>Find Vets Near You</h2>

      <div id="map" style="height: 400px"></div>
    </section>

    <script>
      const map = L.map("map").setView([26.9124, 75.7873], 10);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap",
      }).addTo(map);

      const vets = [
        { name: "City Vet Clinic", lat: 26.9124, lng: 75.7873 },
        { name: "Pet Care Hospital", lat: 26.92, lng: 75.8 },
      ];

      vets.forEach((vet) => {
        L.marker([vet.lat, vet.lng]).addTo(map).bindPopup(vet.name);
      });
    </script>
  </body>
</html>
