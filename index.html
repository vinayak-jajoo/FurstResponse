<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Furst Response</title>

    <!-- Only basic CSS -->

  <body>
    <!-- HEADER -->
    <header>
      <div class="container">
        <h1>Furst Response</h1>

        <nav>
          <a href="#diagnosis">Quick Diagnosis</a>
          <a href="#tips">Health Tips</a>
        </nav>
      </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
      <div class="container">
        <h1>The Paw-fect advice, instantly.</h1>
        <p>Get quick healthcare guidance for your dog.</p>
      </div>
    </section>

    <!-- DIAGNOSIS (Placeholder only) -->
    <section id="diagnosis">
      <div class="container">
        <h2>Quick Symptom Diagnosis</h2>

        <div class="chatbot-container">
          <div class="chat-header">
            <h3>Canine Health Assistant</h3>
          </div>

          <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
              Hello! Describe your dog's symptoms.
            </div>
          </div>

          <div class="chat-input">
            <input type="text" id="userInput" placeholder="Enter symptoms..." />
            <button id="sendBtn">Send</button>
          </div>
        </div>
      </div>
    </section>

    <!-- HEALTH TIPS (Placeholder only) -->
    <section id="tips">
      <div class="container">
        <h2>Health Tips</h2>
        <p>Feature coming soon...</p>
      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <p>© 2026 Furst Response</p>
    </footer>

    <!-- Keep JS but no logic yet -->
    <script src="script.js"></script>
  </body>
